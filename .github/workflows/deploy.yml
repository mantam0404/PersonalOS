name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /PersonalOS/

      - name: Publish built site to repo root
        run: |
          cp -r dist/* .
          touch .nojekyll

      - name: Commit and push site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f index.html assets icons favicon.svg manifest.webmanifest sw.js .nojekyll
          git add -f workbox-*.js 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "chore: publish site [skip ci]"
          git push
